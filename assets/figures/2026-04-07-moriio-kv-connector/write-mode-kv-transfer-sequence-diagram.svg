<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 880" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr-right" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#616161"/>
    </marker>
    <marker id="arr-right-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E4002B"/>
    </marker>
    <marker id="arr-right-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00843D"/>
    </marker>
    <marker id="arr-right-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565C0"/>
    </marker>
    <marker id="arr-down" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <polygon points="0 0, 6 0, 3 8" fill="#BDBDBD"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="880" fill="#FAFAFA" rx="8"/>

  <!-- ============================================ -->
  <!-- Column headers -->
  <!-- ============================================ -->
  <!-- PROXY -->
  <rect x="60" y="20" width="130" height="40" rx="8" fill="#FFFFFF" stroke="#1565C0" stroke-width="2"/>
  <text x="125" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">PROXY</text>

  <!-- PREFILL SERVER -->
  <rect x="310" y="20" width="180" height="40" rx="8" fill="#FFFFFF" stroke="#E4002B" stroke-width="2"/>
  <text x="400" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#E4002B">PREFILL SERVER</text>
  <text x="400" y="54" text-anchor="middle" font-size="10" fill="#888">GPU 0-3</text>

  <!-- DECODE SERVER -->
  <rect x="610" y="20" width="180" height="40" rx="8" fill="#FFFFFF" stroke="#00843D" stroke-width="2"/>
  <text x="700" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#00843D">DECODE SERVER</text>
  <text x="700" y="54" text-anchor="middle" font-size="10" fill="#888">GPU 4-7</text>

  <!-- ============================================ -->
  <!-- Lifelines -->
  <!-- ============================================ -->
  <line x1="125" y1="60" x2="125" y2="840" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="400" y1="60" x2="400" y2="840" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="700" y1="60" x2="700" y2="840" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Time arrow on left -->
  <line x1="25" y1="80" x2="25" y2="830" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="22,830 25,845 28,830" fill="#BDBDBD"/>
  <text x="25" y="862" text-anchor="middle" font-size="10" font-weight="600" fill="#BDBDBD">TIME</text>

  <!-- ============================================ -->
  <!-- Step 1: receive request  y=100 -->
  <!-- ============================================ -->
  <line x1="50" y1="100" x2="118" y2="100" stroke="#616161" stroke-width="2" marker-end="url(#arr-right)"/>
  <text x="84" y="93" text-anchor="middle" font-size="10" font-weight="600" fill="#555">receive request</text>

  <!-- ============================================ -->
  <!-- Step 2: Concurrent dispatch  y=138, y=163 -->
  <!-- ============================================ -->
  <!-- Concurrent bracket on left -->
  <line x1="48" y1="131" x2="48" y2="170" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="48" y1="131" x2="56" y2="131" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="48" y1="170" x2="56" y2="170" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="36" y="156" text-anchor="middle" font-size="8" font-weight="700" fill="#7B1FA2" transform="rotate(-90,36,153)">concurrent</text>

  <!-- Proxy → Prefill y=138 -->
  <line x1="130" y1="138" x2="393" y2="138" stroke="#E4002B" stroke-width="2" marker-end="url(#arr-right-red)"/>
  <text x="262" y="131" text-anchor="middle" font-size="11" font-weight="600" fill="#E4002B">send request</text>

  <!-- Proxy → Decode y=163 -->
  <line x1="130" y1="163" x2="693" y2="163" stroke="#00843D" stroke-width="2" marker-end="url(#arr-right-green)"/>
  <text x="412" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#00843D">send request (concurrent — no wait for prefill)</text>

  <!-- ============================================ -->
  <!-- Decode: allocate block & WAITING_FOR_REMOTE_KVS  y=200–258 -->
  <!-- ============================================ -->
  <rect x="660" y="198" width="80" height="60" rx="4" fill="#00843D" opacity="0.10" stroke="#00843D" stroke-width="1.5"/>
  <text x="700" y="218" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">allocate block</text>
  <text x="700" y="232" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">WAITING_FOR</text>
  <text x="700" y="246" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">REMOTE_KVS</text>

  <!-- ============================================ -->
  <!-- Zone: Prefill compute + RDMA WRITE interleaved  y=278–622 -->
  <!-- ============================================ -->
  <rect x="355" y="278" width="388" height="344" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="549" y="298" text-anchor="middle" font-size="10" font-weight="700" fill="#0D47A1">Prefill compute + RDMA WRITE (Mori-IO) — layer-by-layer push</text>

  <!-- Decode waiting bar spanning the zone -->
  <rect x="683" y="293" width="18" height="320" rx="3" fill="#1565C0" opacity="0.12" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Layer 0  prefill box  y=308–363 -->
  <rect x="365" y="308" width="70" height="55" rx="4" fill="#E4002B" opacity="0.10" stroke="#E4002B" stroke-width="1.5"/>
  <text x="400" y="333" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">prefill forward</text>
  <text x="400" y="347" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">layer 0</text>

  <!-- RDMA WRITE arrow layer 0  y=377 -->
  <line x1="437" y1="377" x2="681" y2="377" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-right-blue)"/>
  <text x="559" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">layer 0 kv (written by mori-io)</text>

  <!-- Layer 1  prefill box  y=398–453 -->
  <rect x="365" y="398" width="70" height="55" rx="4" fill="#E4002B" opacity="0.10" stroke="#E4002B" stroke-width="1.5"/>
  <text x="400" y="423" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">prefill forward</text>
  <text x="400" y="437" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">layer 1</text>

  <!-- RDMA WRITE arrow layer 1  y=467 -->
  <line x1="437" y1="467" x2="681" y2="467" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-right-blue)"/>
  <text x="559" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">layer 1 kv (written by mori-io)</text>

  <!-- Ellipsis -->
  <text x="400" y="504" text-anchor="middle" font-size="14" font-weight="700" fill="#999">...</text>
  <text x="559" y="504" text-anchor="middle" font-size="14" font-weight="700" fill="#1565C0" opacity="0.5">···</text>

  <!-- Layer n  prefill box  y=520–575 -->
  <rect x="365" y="520" width="70" height="55" rx="4" fill="#E4002B" opacity="0.10" stroke="#E4002B" stroke-width="1.5"/>
  <text x="400" y="545" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">prefill forward</text>
  <text x="400" y="559" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">layer n</text>

  <!-- RDMA WRITE arrow layer n  y=589 -->
  <line x1="437" y1="589" x2="681" y2="589" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-right-blue)"/>
  <text x="559" y="582" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">layer n kv (written by mori-io)</text>

  <!-- ============================================ -->
  <!-- Decode: all KV received / move to ready queue  y=644–694 -->
  <!-- ============================================ -->
  <rect x="660" y="644" width="80" height="50" rx="4" fill="#00843D" opacity="0.10" stroke="#00843D" stroke-width="1.5"/>
  <text x="700" y="663" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">all KV received</text>
  <text x="700" y="677" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">move to</text>
  <text x="700" y="689" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">ready queue</text>

  <!-- ============================================ -->
  <!-- Decode: decode forward  y=714–804 -->
  <!-- ============================================ -->
  <rect x="660" y="714" width="80" height="90" rx="4" fill="#00843D" opacity="0.15" stroke="#00843D" stroke-width="1.5"/>
  <text x="700" y="754" text-anchor="middle" font-size="10" font-weight="600" fill="#1B5E20">decode</text>
  <text x="700" y="768" text-anchor="middle" font-size="10" font-weight="600" fill="#1B5E20">forward</text>
</svg>
