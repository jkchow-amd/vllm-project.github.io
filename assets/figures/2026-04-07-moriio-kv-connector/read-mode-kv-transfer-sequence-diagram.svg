<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1120" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr-right" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#616161"/>
    </marker>
    <marker id="arr-right-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E4002B"/>
    </marker>
    <marker id="arr-right-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00843D"/>
    </marker>
    <marker id="arr-left" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#616161"/>
    </marker>
    <marker id="arr-left-red" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#E4002B"/>
    </marker>
    <marker id="arr-left-blue" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#1565C0"/>
    </marker>
    <marker id="arr-right-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565C0"/>
    </marker>
    <marker id="arr-down" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <polygon points="0 0, 6 0, 3 8" fill="#BDBDBD"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="1120" fill="#FAFAFA" rx="8"/>

  <!-- ============================================ -->
  <!-- Column headers -->
  <!-- ============================================ -->
  <!-- PROXY -->
  <rect x="60" y="20" width="130" height="40" rx="8" fill="#FFFFFF" stroke="#1565C0" stroke-width="2"/>
  <text x="125" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">PROXY</text>

  <!-- PREFILL SERVER -->
  <rect x="310" y="20" width="180" height="40" rx="8" fill="#FFFFFF" stroke="#E4002B" stroke-width="2"/>
  <text x="400" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#E4002B">PREFILL SERVER</text>
  <text x="400" y="54" text-anchor="middle" font-size="10" fill="#888">GPU 0-3</text>

  <!-- DECODE SERVER -->
  <rect x="610" y="20" width="180" height="40" rx="8" fill="#FFFFFF" stroke="#00843D" stroke-width="2"/>
  <text x="700" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#00843D">DECODE SERVER</text>
  <text x="700" y="54" text-anchor="middle" font-size="10" fill="#888">GPU 4-7</text>

  <!-- ============================================ -->
  <!-- Lifelines -->
  <!-- ============================================ -->
  <line x1="125" y1="60" x2="125" y2="1080" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="400" y1="60" x2="400" y2="1080" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="700" y1="60" x2="700" y2="1080" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Time arrow on left -->
  <line x1="25" y1="80" x2="25" y2="1070" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="22,1070 25,1085 28,1070" fill="#BDBDBD"/>
  <text x="25" y="1100" text-anchor="middle" font-size="10" font-weight="600" fill="#BDBDBD">TIME</text>

  <!-- ============================================ -->
  <!-- Step 1: receive request  y=100 -->
  <!-- ============================================ -->
  <line x1="50" y1="100" x2="118" y2="100" stroke="#616161" stroke-width="2" marker-end="url(#arr-right)"/>
  <text x="84" y="93" text-anchor="middle" font-size="10" font-weight="600" fill="#555">receive request</text>

  <!-- ============================================ -->
  <!-- Step 2: Proxy → Prefill (send request)  y=145 -->
  <!-- ============================================ -->
  <line x1="130" y1="145" x2="393" y2="145" stroke="#E4002B" stroke-width="2" marker-end="url(#arr-right-red)"/>
  <text x="262" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#E4002B">send request</text>

  <!-- ============================================ -->
  <!-- Prefill forward pass layers (activation boxes) -->
  <!-- ============================================ -->

  <!-- Layer 0  y=185–240 -->
  <rect x="365" y="185" width="70" height="55" rx="4" fill="#E4002B" opacity="0.10" stroke="#E4002B" stroke-width="1.5"/>
  <text x="400" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">prefill forward</text>
  <text x="400" y="224" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">layer 0</text>

  <!-- Layer 1  y=255–310 -->
  <rect x="365" y="255" width="70" height="55" rx="4" fill="#E4002B" opacity="0.10" stroke="#E4002B" stroke-width="1.5"/>
  <text x="400" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">prefill forward</text>
  <text x="400" y="294" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">layer 1</text>

  <!-- Ellipsis -->
  <text x="400" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#999">...</text>

  <!-- Layer n  y=360–415 -->
  <rect x="365" y="360" width="70" height="55" rx="4" fill="#E4002B" opacity="0.10" stroke="#E4002B" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">prefill forward</text>
  <text x="400" y="399" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">layer n</text>

  <!-- ============================================ -->
  <!-- Step 3: Prefill → Proxy (return block_ids)  y=455 -->
  <!-- ============================================ -->
  <line x1="393" y1="455" x2="132" y2="455" stroke="#616161" stroke-width="2" marker-end="url(#arr-right)"/>
  <text x="262" y="448" text-anchor="middle" font-size="11" font-weight="600" fill="#333">return block_ids</text>

  <!-- ============================================ -->
  <!-- Step 4: Proxy → Decode (send request with remote_block_ids)  y=505 -->
  <!-- ============================================ -->
  <line x1="130" y1="505" x2="693" y2="505" stroke="#00843D" stroke-width="2" marker-end="url(#arr-right-green)"/>
  <text x="412" y="498" text-anchor="middle" font-size="11" font-weight="600" fill="#00843D">send request (with remote_block_ids)</text>

  <!-- ============================================ -->
  <!-- Decode: allocate block & move to wait queue  y=540–590 -->
  <!-- ============================================ -->
  <rect x="660" y="540" width="80" height="50" rx="4" fill="#00843D" opacity="0.10" stroke="#00843D" stroke-width="1.5"/>
  <text x="700" y="560" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">allocate block</text>
  <text x="700" y="574" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">&amp; move to</text>
  <text x="700" y="586" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">wait queue</text>

  <!-- ============================================ -->
  <!-- KV Transfer: layer-by-layer RDMA reads -->
  <!-- Blue zone background  y=615–810 -->
  <!-- ============================================ -->
  <rect x="355" y="615" width="380" height="195" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="545" y="636" text-anchor="middle" font-size="10" font-weight="700" fill="#0D47A1">KV cache transfer via Mori-IO (RDMA READ over NIC)</text>

  <!-- Layer 0 kv  y=655 -->
  <line x1="693" y1="655" x2="407" y2="655" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-right-blue)"/>
  <text x="550" y="648" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">layer 0 kv (read by mori-io)</text>

  <!-- Layer 1 kv  y=690 -->
  <line x1="693" y1="690" x2="407" y2="690" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-right-blue)"/>
  <text x="550" y="683" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">layer 1 kv (read by mori-io)</text>

  <!-- Ellipsis -->
  <text x="550" y="725" text-anchor="middle" font-size="14" font-weight="700" fill="#1565C0">...</text>

  <!-- Layer n kv  y=750 -->
  <line x1="693" y1="750" x2="407" y2="750" stroke="#1565C0" stroke-width="2" marker-end="url(#arr-right-blue)"/>
  <text x="550" y="743" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">layer n kv (read by mori-io)</text>

  <!-- ============================================ -->
  <!-- Step: notify (free blocks)  y=840 -->
  <!-- ============================================ -->
  <line x1="693" y1="840" x2="407" y2="840" stroke="#616161" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-right)"/>
  <text x="550" y="833" text-anchor="middle" font-size="10" font-weight="600" fill="#888">notify (free blocks)</text>

  <!-- ============================================ -->
  <!-- Prefill: free blocks  y=875–920 -->
  <!-- ============================================ -->
  <rect x="365" y="875" width="70" height="45" rx="4" fill="#E4002B" opacity="0.08" stroke="#E4002B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="902" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">free blocks</text>

  <!-- ============================================ -->
  <!-- Decode: move to ready queue  y=875–920 -->
  <!-- ============================================ -->
  <rect x="660" y="875" width="80" height="45" rx="4" fill="#00843D" opacity="0.10" stroke="#00843D" stroke-width="1.5"/>
  <text x="700" y="895" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">move to</text>
  <text x="700" y="909" text-anchor="middle" font-size="9" font-weight="600" fill="#1B5E20">ready queue</text>

  <!-- ============================================ -->
  <!-- Decode: decode forward  y=950–1010 -->
  <!-- ============================================ -->
  <rect x="660" y="950" width="80" height="60" rx="4" fill="#00843D" opacity="0.15" stroke="#00843D" stroke-width="1.5"/>
  <text x="700" y="977" text-anchor="middle" font-size="10" font-weight="600" fill="#1B5E20">decode</text>
  <text x="700" y="991" text-anchor="middle" font-size="10" font-weight="600" fill="#1B5E20">forward</text>
</svg>
